<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Convert YouTube videos to high-quality WAV audio files instantly." />
  <title>Wavify — YouTube to WAV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>



  <main class="main-center">
    <div class="hero-text">
      <h1>YouTube <em>to</em> WAV</h1>
    </div>

    <div class="card converter-card">
      <form id="converter-form" novalidate>
        <div class="input-row">
          <label for="url-input" class="sr-only">YouTube URL</label>
          <div class="input-wrap" id="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#c8a882"/>
                <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/>
              </svg>
            </span>
            <input
              type="url"
              id="url-input"
              name="url"
              placeholder="Paste a YouTube link…"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="clear-btn" class="clear-btn" aria-label="Clear input" hidden>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <button type="submit" id="convert-btn" class="btn btn-primary" aria-label="Convert to WAV">
            <span class="btn-text">Convert</span>
            <span class="btn-icon" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M9 2v10M5 8l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
          </button>
        </div>
      </form>

      <!-- Video preview -->
      <div id="preview-pane" class="preview-pane" hidden>
        <div class="preview-inner">
          <img id="preview-thumb" class="preview-thumb" src="" alt="Video thumbnail" />
          <div class="preview-meta">
            <p id="preview-title" class="preview-title"></p>
            <p id="preview-channel" class="preview-channel"></p>
            <p id="preview-duration" class="preview-duration"></p>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div id="status-area" class="status-area" aria-live="assertive" aria-atomic="true"></div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
